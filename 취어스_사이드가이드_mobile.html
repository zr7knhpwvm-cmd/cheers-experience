<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>숙취를 부시자 — 취어스</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    background:#111;
    font-family:'Black Han Sans',sans-serif;
    overflow:hidden;
    cursor:none;
    display:flex;
    align-items:center;
    justify-content:center;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #000;
    overflow: hidden;
    flex-shrink: 0;
  }

  #inputVideo { position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }

  #glCanvas, #faceCanvas, #fxCanvas {
    position:absolute; top:0; left:0; width:100%; height:100%;
  }
  #glCanvas   { z-index:1; }
  #faceCanvas { z-index:2; pointer-events:none; }
  #fxCanvas   { z-index:3; pointer-events:none; }
  #hitLayer   { position:absolute; inset:0; z-index:5; cursor:none; touch-action:none; }

  #cursor {
    display: none;
  }

  #slapText {
    position:absolute; pointer-events:none; z-index:40;
    font-size:0px; color:#ff1a2e;
    text-shadow:0 0 20px rgba(255,26,46,0.8), 0 0 40px rgba(255,26,46,0.4);
    opacity:0; transform:translate(-50%,-50%);
  }
  #flash { position:absolute; inset:0; opacity:0; pointer-events:none; z-index:10; }

  #statusText {
    position:absolute; top:36px; left:0; right:0; text-align:center;
    font-family:'Noto Sans KR',sans-serif; font-weight:300; font-size:clamp(13px,2.2vh,20px);
    color:rgba(255,255,255,0.85); z-index:20; pointer-events:none;
    text-shadow:0 2px 16px rgba(0,0,0,1); transition:color 0.5s;
    padding:0 20px;
  }

  #gauge {
    position:absolute; bottom:44px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:12px;
    z-index:20; pointer-events:none;
  }
  .g-label { font-family:'Noto Sans KR',sans-serif; font-weight:300; font-size:clamp(11px,1.6vh,15px); color:rgba(255,255,255,0.35); letter-spacing:.35em; }
  .g-bar { width:clamp(180px,55%,300px); height:4px; background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden; }
  .g-fill { height:100%; background:linear-gradient(90deg,#ff1a2e,#ffd000); border-radius:2px; width:0%; transition:width .3s ease; box-shadow:0 0 8px #ff1a2e; }
  .g-hint { font-family:'Noto Sans KR',sans-serif; font-weight:300; font-size:clamp(11px,1.6vh,15px); color:rgba(255,255,255,0.2); letter-spacing:.2em; animation:pulse 2.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:.7} }

  #loadingScreen {
    position:absolute; inset:0; background:#000;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:200; gap:28px;
    transition: opacity 0.8s ease;
  }
  .l-title { font-size:clamp(22px,4vh,36px); color:#fff; letter-spacing:.05em; }
  .l-title span { color:#ff1a2e; }
  .l-bar { width:55%; height:2px; background:rgba(255,255,255,0.08); border-radius:1px; overflow:hidden; }
  .l-fill { height:100%; background:#ff1a2e; border-radius:1px; animation:ld 1.8s ease-in-out infinite; }
  @keyframes ld { 0%{width:0%} 60%{width:85%} 100%{width:100%} }
  .l-sub { font-family:'Noto Sans KR',sans-serif; font-weight:300; font-size:clamp(12px,1.8vh,16px); color:rgba(255,255,255,0.25); letter-spacing:.35em; }

  /* ─── 왼쪽 사이드 안내 패널 ─── */
  #guideOverlay {
    position: absolute;
    top: 0; left: 0;
    width: clamp(100px, 18vw, 160px);
    height: 100%;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(16px, 3vh, 28px) 0;
    pointer-events: none;
    opacity: 1;
    transition: opacity 1.4s ease;
    /* 오른쪽으로 살짝 fade되는 그라데이션 배경 */
    background: linear-gradient(
      to right,
      rgba(0,0,0,0.82) 0%,
      rgba(0,0,0,0.55) 70%,
      rgba(0,0,0,0) 100%
    );
  }
  #guideOverlay.hidden { opacity: 0; }

  .guide-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(14px, 3.5vh, 36px);
    width: 100%;
    padding: 0 clamp(8px, 1.5vw, 14px);
  }

  /* 각 스텝 카드 */
  .guide-step-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(6px, 1.2vh, 10px);
    width: 100%;
    opacity: 0;
    transform: translateY(10px);
    animation: stepIn 0.5s ease forwards;
  }
  .guide-step-item:nth-child(1) { animation-delay: 0.2s; }
  .guide-step-item:nth-child(2) { animation-delay: 0.5s; }
  .guide-step-item:nth-child(3) { animation-delay: 0.8s; }
  .guide-step-item:nth-child(4) { animation-delay: 1.1s; }
  @keyframes stepIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* 번호 배지 */
  .guide-num {
    width: clamp(18px, 2.8vh, 26px);
    height: clamp(18px, 2.8vh, 26px);
    border-radius: 50%;
    background: #ff1a2e;
    color: #fff;
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(9px, 1.4vh, 13px);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    position: absolute;
    top: 0; left: 50%;
    transform: translate(-50%, -40%);
  }

  /* 아이콘 원형 컨테이너 */
  .guide-icon-wrap {
    position: relative;
    width: clamp(48px, 8.5vh, 76px);
    height: clamp(48px, 8.5vh, 76px);
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .guide-icon {
    font-size: clamp(22px, 4vh, 36px);
    line-height: 1;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.2));
  }

  /* SVG 아이콘 (흰색 라인) */
  .guide-icon svg {
    width: clamp(22px, 4vh, 36px);
    height: clamp(22px, 4vh, 36px);
    fill: #fff;
    opacity: 0.9;
  }

  /* 텍스트 */
  .guide-label {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    font-size: clamp(10px, 1.6vh, 14px);
    color: rgba(255,255,255,0.8);
    letter-spacing: .04em;
    text-align: center;
    text-shadow: 0 1px 8px rgba(0,0,0,1);
    line-height: 1.45;
    word-break: keep-all;
  }

  /* 스텝 사이 구분선 */
  .guide-line {
    width: 1px;
    height: clamp(10px, 2vh, 20px);
    background: rgba(255,255,255,0.12);
    flex-shrink: 0;
  }

  /* 시작화면 — 완전히 숨김 */
  #startScreen { display:none !important; }

  #clearScreen {
    position:absolute; inset:0; background:rgba(0,0,0,0);
    display:none; flex-direction:column; align-items:center; justify-content:center;
    z-index:90; gap:clamp(10px,2vh,20px);
    padding: 0 8%;
  }
  #clearScreen.show { display:flex; animation:cfade .9s ease forwards; }
  @keyframes cfade { to { background:rgba(0,0,0,.92); } }
  .c-label { font-family:'Noto Sans KR',sans-serif; font-weight:300; font-size:clamp(11px,1.6vh,14px); color:rgba(255,255,255,.3); letter-spacing:.5em; animation:up .5s ease forwards .3s; opacity:0; }
  .c-title { font-size:clamp(60px,12vh,120px); color:#fff; line-height:1; animation:up .5s ease forwards .7s; opacity:0; }
  .c-title span { color:#ff1a2e; }
  .c-chips { display:flex; gap:10px; margin-top:6px; animation:up .5s ease forwards 1.1s; opacity:0; flex-wrap:wrap; justify-content:center; }
  .chip { padding:9px 18px; border:1px solid rgba(255,255,255,.18); color:rgba(255,255,255,.75); font-family:'Noto Sans KR',sans-serif; font-size:clamp(12px,1.8vh,16px); font-weight:300; }
  .ck { color:#ff1a2e; font-weight:700; margin-right:4px; }
  .c-copy { font-family:'Noto Sans KR',sans-serif; font-weight:300; font-size:clamp(13px,2vh,18px); color:rgba(255,255,255,.28); letter-spacing:.3em; animation:up .5s ease forwards 1.5s; opacity:0; }
  .c-btn {
    margin-top:10px;
    padding:clamp(11px,1.8vh,16px) clamp(28px,8%,50px);
    background:transparent; border:1px solid rgba(255,255,255,.15);
    color:rgba(255,255,255,.45); font-family:'Noto Sans KR',sans-serif;
    font-size:clamp(12px,1.8vh,15px); letter-spacing:.3em;
    cursor:pointer; transition:all .3s; animation:up .5s ease forwards 2s; opacity:0;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .c-btn:active { border-color:#ff1a2e; color:#fff; }
  @keyframes up { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

  #fullscreenBtn {
    position:absolute; bottom:18px; right:18px; z-index:300;
    width:36px; height:36px;
    background:rgba(255,255,255,0.08); border:none;
    border-radius:4px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background .2s;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
  }
  #fullscreenBtn:active { background:rgba(255,255,255,0.22); }
  #fullscreenBtn svg { width:18px; height:18px; fill:rgba(255,255,255,0.7); }
</style>
</head>
<body>

<div id="app">
  <video id="inputVideo" playsinline muted></video>
  <canvas id="glCanvas"></canvas>
  <canvas id="faceCanvas"></canvas>
  <canvas id="fxCanvas"></canvas>
  <div id="hitLayer"></div>
  <div id="cursor">🔨</div>
  <div id="flash"></div>

  <button id="fullscreenBtn" onclick="toggleFullscreen()" ontouchend="event.preventDefault();toggleFullscreen()" title="전체화면">
    <svg id="fsIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
    </svg>
  </button>
  <div id="slapText">찰싹!</div>
  <div id="statusText">어젯밤에 뭔 짓을 한 거야...</div>

  <div id="gauge">
    <div class="g-label">숙취 해소 중</div>
    <div class="g-bar"><div class="g-fill" id="gaugeFill"></div></div>
    <div class="g-hint">🔨 두드릴수록 숙취가 사라집니다</div>
  </div>

  <div id="clearScreen">
    <div class="c-label">일반의약품</div>
    <div class="c-title">취<span>어</span>스</div>
    <div class="c-chips">
      <div class="chip"><span class="ck">✓</span>두통</div>
      <div class="chip"><span class="ck">✓</span>구토</div>
      <div class="chip"><span class="ck">✓</span>갈증</div>
      <div class="chip"><span class="ck">✓</span>소화불량</div>
    </div>
    <div class="c-copy">처음부터 약국 갈걸</div>
    <button class="c-btn" onclick="resetAll()" ontouchend="event.preventDefault();resetAll()">다시 체험하기</button>
  </div>

  <div id="loadingScreen" style="display:flex;">
    <div class="l-title">얼굴 인식 <span>준비 중</span></div>
    <div class="l-bar"><div class="l-fill"></div></div>
    <div class="l-sub">잠시만 기다려주세요</div>
  </div>

  <!-- 왼쪽 사이드 사용 안내 패널 -->
  <div id="guideOverlay">
    <div class="guide-inner">

      <!-- STEP 1: 발에 맞춰 서주세요 -->
      <div class="guide-step-item">
        <div class="guide-icon-wrap">
          <div class="guide-num">1</div>
          <div class="guide-icon">
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
              <!-- 발바닥 두 개 -->
              <ellipse cx="20" cy="22" rx="7" ry="10" fill="white"/>
              <ellipse cx="20" cy="12" rx="3" ry="3.5" fill="white"/>
              <ellipse cx="26" cy="11" rx="2.5" ry="3" fill="white"/>
              <ellipse cx="31" cy="12" rx="2.2" ry="2.8" fill="white"/>
              <ellipse cx="35" cy="14" rx="2" ry="2.5" fill="white"/>
              <ellipse cx="38" cy="17" rx="1.8" ry="2.2" fill="white"/>
              <ellipse cx="44" cy="22" rx="7" ry="10" fill="white"/>
              <ellipse cx="38" cy="12" rx="3" ry="3.5" fill="white" transform="scale(-1,1) translate(-64,0)"/>
            </svg>
          </div>
        </div>
        <div class="guide-label">발에 맞춰<br>서주세요</div>
      </div>

      <div class="guide-line"></div>

      <!-- STEP 2: 취한 나를 확인하세요 -->
      <div class="guide-step-item">
        <div class="guide-icon-wrap">
          <div class="guide-num">2</div>
          <div class="guide-icon">
            <!-- 취한 얼굴 SVG -->
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
              <circle cx="32" cy="34" r="16" fill="none" stroke="white" stroke-width="2.5"/>
              <!-- 눈 (빙글) -->
              <circle cx="25" cy="30" r="4" fill="none" stroke="white" stroke-width="2"/>
              <path d="M23,30 Q25,27 27,30" fill="none" stroke="white" stroke-width="1.5"/>
              <circle cx="39" cy="30" r="4" fill="none" stroke="white" stroke-width="2"/>
              <path d="M37,30 Q39,27 41,30" fill="none" stroke="white" stroke-width="1.5"/>
              <!-- 볼 홍조 -->
              <ellipse cx="22" cy="37" rx="4" ry="2.5" fill="white" opacity="0.5"/>
              <ellipse cx="42" cy="37" rx="4" ry="2.5" fill="white" opacity="0.5"/>
              <!-- 입 (삐뚤) -->
              <path d="M26,41 Q32,44 38,41" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <!-- 머리카락 삐침 -->
              <path d="M22,18 Q20,10 18,8" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
              <path d="M30,18 Q30,10 31,7" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
              <path d="M38,18 Q40,10 44,9" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
              <!-- 반짝이 -->
              <path d="M48,12 L49,8 L50,12 L54,13 L50,14 L49,18 L48,14 L44,13 Z" fill="white" opacity="0.9"/>
              <path d="M10,20 L11,17 L12,20 L15,21 L12,22 L11,25 L10,22 L7,21 Z" fill="white" opacity="0.7"/>
            </svg>
          </div>
        </div>
        <div class="guide-label">취한 나를<br>확인하세요</div>
      </div>

      <div class="guide-line"></div>

      <!-- STEP 3: 화면을 때리세요 -->
      <div class="guide-step-item">
        <div class="guide-icon-wrap">
          <div class="guide-num">3</div>
          <div class="guide-icon">
            <!-- 망치로 화면 때리기 SVG -->
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
              <!-- 화면 프레임 (깨진) -->
              <rect x="8" y="12" width="30" height="40" rx="2" fill="none" stroke="white" stroke-width="2.2"/>
              <!-- 균열 -->
              <path d="M22,12 L18,28 L24,32 L16,52" stroke="white" stroke-width="1.5" fill="none" opacity="0.8"/>
              <path d="M22,12 L26,20 L20,24" stroke="white" stroke-width="1.2" fill="none" opacity="0.6"/>
              <!-- 망치 -->
              <rect x="34" y="8" width="14" height="9" rx="2" fill="white" transform="rotate(45 41 12)"/>
              <line x1="41" y1="20" x2="52" y2="52" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
              <!-- 충격 효과 -->
              <path d="M20,8 L22,4" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
              <path d="M28,6 L31,3" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
              <path d="M13,10 L10,7" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
            </svg>
          </div>
        </div>
        <div class="guide-label">화면을<br>때리세요</div>
      </div>

      <div class="guide-line"></div>

      <!-- STEP 4: 정신차린 나를 확인하세요 -->
      <div class="guide-step-item">
        <div class="guide-icon-wrap">
          <div class="guide-num">4</div>
          <div class="guide-icon">
            <!-- 정신차린 얼굴 SVG -->
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
              <circle cx="32" cy="34" r="16" fill="none" stroke="white" stroke-width="2.5"/>
              <!-- 눈 (밝은) -->
              <circle cx="26" cy="30" r="3.5" fill="white"/>
              <circle cx="38" cy="30" r="3.5" fill="white"/>
              <circle cx="27" cy="29" r="1.2" fill="#111"/>
              <circle cx="39" cy="29" r="1.2" fill="#111"/>
              <!-- 웃는 입 -->
              <path d="M24,40 Q32,47 40,40" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
              <!-- 머리 + 주먹 올리기 표현 (헤어) -->
              <path d="M22,18 Q24,14 32,18 Q40,14 42,18" stroke="white" stroke-width="2" fill="none"/>
              <!-- 주먹 들기 암시 — 화살표/라인 -->
              <path d="M46,38 L52,26" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <path d="M48,25 L52,26 L51,30" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="guide-label">정신차린<br>나를 확인!</div>
      </div>

    </div>
  </div>

  <div id="startScreen"></div>
</div>

<script>
const glCanvas   = document.getElementById('glCanvas');
const gl         = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');
const faceCanvas = document.getElementById('faceCanvas');
const fxCanvas   = document.getElementById('fxCanvas');
const fCtx       = faceCanvas.getContext('2d');
const fxCtx      = fxCanvas.getContext('2d');

const APP = document.getElementById('app');
let W = APP.clientWidth || window.innerWidth;
let H = APP.clientHeight || window.innerHeight;

function resize() {
  W = APP.clientWidth; H = APP.clientHeight;
  glCanvas.width  = faceCanvas.width  = fxCanvas.width  = W;
  glCanvas.height = faceCanvas.height = fxCanvas.height = H;
  if (gl) gl.viewport(0, 0, W, H);
}
setTimeout(resize, 50);
window.addEventListener('resize', resize);

const vsSource = `
  attribute vec2 a_position;
  attribute vec2 a_texCoord;
  varying vec2 v_texCoord;
  void main() { gl_Position = vec4(a_position,0,1); v_texCoord = a_texCoord; }
`;
const fsSource = `
  precision mediump float;
  uniform sampler2D u_image;
  uniform float u_drunk;
  uniform float u_time;
  uniform vec2  u_resolution;
  uniform float u_shakeX;
  uniform float u_shakeY;
  uniform float u_vidAspect;
  uniform float u_scrAspect;
  varying vec2 v_texCoord;

  vec3 rgb2hsv(vec3 c){
    vec4 K=vec4(0.,-1./3.,2./3.,-1.);
    vec4 p=mix(vec4(c.bg,K.wz),vec4(c.gb,K.xy),step(c.b,c.g));
    vec4 q=mix(vec4(p.xyw,c.r),vec4(c.r,p.yzx),step(p.x,c.r));
    float d=q.x-min(q.w,q.y); float e=1e-10;
    return vec3(abs(q.z+(q.w-q.y)/(6.*d+e)),d/(q.x+e),q.x);
  }
  vec3 hsv2rgb(vec3 c){
    vec4 K=vec4(1.,2./3.,1./3.,3.);
    vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);
    return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);
  }

  void main(){
    vec2 uv = v_texCoord;
    uv.x = 1.0 - uv.x;
    float vidAR = u_vidAspect; float scrAR = u_scrAspect;
    if(vidAR > scrAR) {
      float scale = scrAR / vidAR;
      uv.x = uv.x * scale + (1.0 - scale) * 0.5;
    } else {
      float scale = vidAR / scrAR;
      uv.y = uv.y * scale + (1.0 - scale) * 0.5;
    }
    uv.x += u_shakeX / u_resolution.x;
    uv.y += u_shakeY / u_resolution.y;
    if(u_drunk > 0.05){
      float wt = u_time * 0.02; float w  = u_drunk * 0.004;
      uv.x += sin(uv.y*7.+wt*1.8)*w;
      uv.y += cos(uv.x*5.5+wt*1.3)*w*0.5;
    }
    vec2 uvC = clamp(uv,0.,1.);
    float ga = u_drunk * 0.013;
    vec2 g1 = clamp(uv+vec2(ga*1.9,ga*0.5),0.,1.);
    vec2 g2 = clamp(uv-vec2(ga*0.8,ga*0.3),0.,1.);
    vec4 c0 = texture2D(u_image,uvC);
    vec4 c1 = texture2D(u_image,g1);
    vec4 c2 = texture2D(u_image,g2);
    vec3 col = c0.rgb;
    col = mix(col,c1.rgb,u_drunk*0.17);
    col = mix(col,c2.rgb,u_drunk*0.07);
    vec3 hsv = rgb2hsv(col);
    hsv.y = hsv.y*(1.+u_drunk*0.08);
    hsv.x = mix(hsv.x,0.02,u_drunk*0.06);
    hsv.z = hsv.z*(1.-u_drunk*0.10);
    col = hsv2rgb(hsv);
    vec2 ctr = uv-0.5;
    float vig = 1.-dot(ctr,ctr)*(0.7+u_drunk*2.0);
    col *= clamp(vig,0.,1.);
    float edg = length(ctr)*1.7;
    float rv  = smoothstep(0.3,1.,edg)*u_drunk*0.5;
    col = mix(col,vec3(0.5,0.02,0.02),rv);
    gl_FragColor = vec4(col,1.);
  }
`;

function compileShader(gl,type,src){
  const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));return null;}
  return s;
}

let glProg, glTex, uDrunk, uTime, uRes, uShakeX, uShakeY, uVidAspect, uScrAspect;
function initGL(){
  if(!gl) return;
  const vs=compileShader(gl,gl.VERTEX_SHADER,vsSource);
  const fs=compileShader(gl,gl.FRAGMENT_SHADER,fsSource);
  glProg=gl.createProgram();
  gl.attachShader(glProg,vs); gl.attachShader(glProg,fs);
  gl.linkProgram(glProg); gl.useProgram(glProg);
  const pos=new Float32Array([-1,-1,1,-1,-1,1,1,1]);
  const tex=new Float32Array([0,1,1,1,0,0,1,0]);
  const pb=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,pb);
  gl.bufferData(gl.ARRAY_BUFFER,pos,gl.STATIC_DRAW);
  const pl=gl.getAttribLocation(glProg,'a_position');
  gl.enableVertexAttribArray(pl); gl.vertexAttribPointer(pl,2,gl.FLOAT,false,0,0);
  const tb=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,tb);
  gl.bufferData(gl.ARRAY_BUFFER,tex,gl.STATIC_DRAW);
  const tl=gl.getAttribLocation(glProg,'a_texCoord');
  gl.enableVertexAttribArray(tl); gl.vertexAttribPointer(tl,2,gl.FLOAT,false,0,0);
  glTex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,glTex);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  uDrunk=gl.getUniformLocation(glProg,'u_drunk');
  uTime =gl.getUniformLocation(glProg,'u_time');
  uRes  =gl.getUniformLocation(glProg,'u_resolution');
  uShakeX=gl.getUniformLocation(glProg,'u_shakeX');
  uShakeY=gl.getUniformLocation(glProg,'u_shakeY');
  uVidAspect=gl.getUniformLocation(glProg,'u_vidAspect');
  uScrAspect=gl.getUniformLocation(glProg,'u_scrAspect');
}

function renderGL(frame,drunk,t,sx,sy){
  if(!gl||!glProg||!frame) return;
  gl.bindTexture(gl.TEXTURE_2D,glTex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,frame);
  gl.uniform1f(uDrunk,drunk); gl.uniform1f(uTime,t);
  gl.uniform2f(uRes,W,H);
  gl.uniform1f(uShakeX,sx); gl.uniform1f(uShakeY,sy);
  const vidW = frame.width  || frame.videoWidth  || 1280;
  const vidH = frame.height || frame.videoHeight || 720;
  gl.uniform1f(uVidAspect, vidW / vidH);
  gl.uniform1f(uScrAspect, W / H);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

let hitCount=0, MAX_HITS=10, filterLevel=1.0, isRunning=false;
let time=0, shakeX=0, shakeY=0, shakePow=0, shakeAngle=0, slapSide=1;
let particles=[], currentFaces=null, lastFrame=null;

const statusMsgs=[
  "어젯밤에 뭔 짓을 한 거야...","머리가 깨질 것 같아...",
  "속이 너무 안 좋아...","조금씩 나아지는 것 같은데...",
  "거의 다 왔어! 계속 때려!","이제 살 것 같다...",
];

const LEFT_EYE =[33,160,158,133,153,144];
const RIGHT_EYE=[362,385,387,263,373,380];
const NOSE_TIP =4;
const FOREHEAD =10;
const LEFT_CHEEK_CENTER  = 205;
const RIGHT_CHEEK_CENTER = 425;
const LEFT_FACE_SIDE  = 234;
const RIGHT_FACE_SIDE = 454;

function lx(lm,i){
  const vidAR = (lastFrame ? (lastFrame.width||lastFrame.videoWidth||1280) / (lastFrame.height||lastFrame.videoHeight||720) : 16/9);
  const scrAR = W / H;
  let u = 1 - lm[i].x;
  if(vidAR > scrAR){
    const cropRatio = scrAR / vidAR; const offset = (1 - cropRatio) / 2;
    u = (u - offset) / cropRatio;
  }
  return u * W;
}
function ly(lm,i){
  const vidAR = (lastFrame ? (lastFrame.width||lastFrame.videoWidth||1280) / (lastFrame.height||lastFrame.videoHeight||720) : 16/9);
  const scrAR = W / H;
  let v = lm[i].y;
  if(vidAR < scrAR){
    const cropRatio = vidAR / scrAR; const offset = (1 - cropRatio) / 2;
    v = (v - offset) / cropRatio;
  }
  return v * H;
}

function eyeInfo(lm,pts){
  let x=0,y=0; pts.forEach(i=>{ x+=lx(lm,i); y+=ly(lm,i); });
  x/=pts.length; y/=pts.length;
  const dx=lx(lm,pts[0])-lx(lm,pts[3]); const dy=ly(lm,pts[0])-ly(lm,pts[3]);
  const r=Math.sqrt(dx*dx+dy*dy)*0.68;
  return {x, y, r:Math.max(r,10)};
}

let guideVisible = true;

function hideGuide(){
  if(!guideVisible) return;
  guideVisible = false;
  const g = document.getElementById('guideOverlay');
  g.classList.add('hidden');
  setTimeout(()=>{ g.style.display='none'; }, 1200);
}

async function startExperience(){
  // 전체화면 진입 (iOS Safari는 지원 안 하므로 실패해도 계속 진행)
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if (!isMobile) {
    const el = document.documentElement;
    try {
      if (el.requestFullscreen) await el.requestFullscreen();
      else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
      else if (el.mozRequestFullScreen) await el.mozRequestFullScreen();
    } catch(e) { console.warn('전체화면 실패', e); }
  }

  initGL();
  const video=document.getElementById('inputVideo');
  try {
    // 모바일은 세로 해상도 우선, PC는 가로 우선
    const videoConstraints = isMobile
      ? {facingMode:'user', width:{ideal:720}, height:{ideal:1280}}
      : {width:{ideal:720}, height:{ideal:1280}, facingMode:'user'};
    const stream=await navigator.mediaDevices.getUserMedia({
      video: videoConstraints,
      audio:false
    });
    video.srcObject=stream; await video.play();
  } catch(e){ console.warn('카메라 없음',e); }

  const faceMesh=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
  faceMesh.onResults(r=>{
    lastFrame=r.image;
    currentFaces=r.multiFaceLandmarks?.length?r.multiFaceLandmarks[0]:null;
  });

  const cam=new Camera(video,{
    onFrame:async()=>{ await faceMesh.send({image:video}); },
    width:720, height:1280,
  });
  await cam.start();

  // 로딩 화면 fade out
  const ls = document.getElementById('loadingScreen');
  ls.style.opacity = '0';
  setTimeout(()=>{ ls.style.display='none'; }, 800);

  isRunning=true;
  requestAnimationFrame(loop);

  const hitLayer = document.getElementById('hitLayer');
  hitLayer.addEventListener('click', e=>{
    hideGuide();
    const rect = APP.getBoundingClientRect();
    onHit(e.clientX - rect.left, e.clientY - rect.top);
  });
  hitLayer.addEventListener('touchstart', e=>{
    e.preventDefault();
    hideGuide();
    const rect = APP.getBoundingClientRect();
    const touch = e.touches[0];
    onHit(touch.clientX - rect.left, touch.clientY - rect.top);
  },{passive:false});
}

// 페이지 로드 시 자동으로 체험 시작
window.addEventListener('DOMContentLoaded', ()=>{
  startExperience();
});

// ESC 키로 전체화면 해제 (브라우저 기본 동작)
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
  }
});

const FS_ENTER = '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
const FS_EXIT  = '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>';

function toggleFullscreen(){
  if(document.fullscreenElement || document.webkitFullscreenElement){
    if(document.exitFullscreen) document.exitFullscreen();
    else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
  } else {
    const el = document.documentElement;
    if(el.requestFullscreen) el.requestFullscreen();
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }
}

function updateFsIcon(){
  const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  document.getElementById('fsIcon').innerHTML = isFs ? FS_EXIT : FS_ENTER;
}

// 전체화면 변경 시 리사이즈 재적용
document.addEventListener('fullscreenchange', ()=>{ resize(); updateFsIcon(); });
document.addEventListener('webkitfullscreenchange', ()=>{ resize(); updateFsIcon(); });

const cursor=document.getElementById('cursor');

function loop(){
  if(!isRunning) return;
  time++;
  shakePow*=0.78;
  const shakeScaleX = W / 720; const shakeScaleY = H / 1280;
  if(shakePow>0.6){
    const n=1-shakePow/32;
    shakeX=Math.sin(n*Math.PI*4)*shakePow*shakeAngle*14*shakeScaleX;
    shakeY=Math.abs(Math.sin(n*Math.PI*2.5))*shakePow*5*shakeScaleY;
  } else {
    shakeX=Math.sin(time*0.038+Math.sin(time*0.011)*0.5)*3.5*filterLevel*shakeScaleX;
    shakeY=Math.cos(time*0.055+Math.cos(time*0.014)*0.4)*2.5*filterLevel*shakeScaleY;
  }

  renderGL(lastFrame,filterLevel,time,shakeX,shakeY);
  fCtx.clearRect(0,0,W,H);
  if(currentFaces&&filterLevel>0.02){
    drawFaceEffects(currentFaces);
  }
  drawParticles();
  requestAnimationFrame(loop);
}

function drawFaceEffects(lm){
  const fl=filterLevel;
  const faceLeft  = lx(lm, LEFT_FACE_SIDE);
  const faceRight = lx(lm, RIGHT_FACE_SIDE);
  const faceW     = Math.abs(faceRight - faceLeft);
  const faceCX    = (faceLeft + faceRight) / 2;
  const foreY = ly(lm, FOREHEAD);
  const le = eyeInfo(lm, LEFT_EYE);

  // 1. 볼 홍조
  if(fl > 0.04){
    const lcx = lx(lm, LEFT_CHEEK_CENTER), lcy = ly(lm, LEFT_CHEEK_CENTER);
    const rcx = lx(lm, RIGHT_CHEEK_CENTER), rcy = ly(lm, RIGHT_CHEEK_CENTER);
    drawCheekBlush(fCtx, lcx, lcy, le.r * 1.65, fl);
    drawCheekBlush(fCtx, rcx, rcy, le.r * 1.65, fl);
    const nx=lx(lm,NOSE_TIP), ny=ly(lm,NOSE_TIP);
    drawCheekBlush(fCtx, nx, ny, le.r * 0.6, fl * 0.55);
  }

  // 2. 만취 넥타이 (강화된 입체 버전)
  if(fl > 0.04){
    drawNecktieBand(fCtx, lm, faceW, faceCX, foreY, fl);
  }

  // 3. 비네팅
  drawVignette(fCtx, fl);
}

function drawCheekBlush(ctx, cx, cy, r, fl){
  ctx.save();
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  g.addColorStop(0, `rgba(255, 60, 60, ${fl * 0.8})`);
  g.addColorStop(1, `rgba(200, 0, 0, 0)`);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// --- 개선된 넥타이 밴드 함수 ---
function drawNecktieBand(ctx, lm, faceW, faceCX, foreY, fl) {
  ctx.save();
  ctx.globalAlpha = Math.min(fl * 1.5, 1.0);

  // 눈 위치를 가져와 넥타이가 눈 아래로 내려오지 않게 방어선을 구축합니다.
  const eyeY = (ly(lm, LEFT_EYE[0]) + ly(lm, RIGHT_EYE[0])) / 2;
  const bandY = foreY + (eyeY - foreY) * 0.2; 
  const bandH = faceW * 0.12; 
  
  const leftX = lx(lm, LEFT_FACE_SIDE), rightX = lx(lm, RIGHT_FACE_SIDE);
  const leftY = ly(lm, LEFT_FACE_SIDE), rightY = ly(lm, RIGHT_FACE_SIDE);
  const tilt = Math.atan2(rightY - leftY, rightX - leftX);

  const baseColor = '#162d5a'; 
  const stripeColor = '#3a5ba0';

  // 1. 머리를 감싸는 곡선 밴드
  ctx.save();
  ctx.translate(faceCX, bandY);
  ctx.rotate(tilt);

  ctx.beginPath();
  const bw = faceW * 0.55; 
  ctx.moveTo(-bw, 0);
  ctx.quadraticCurveTo(0, -bandH * 0.3, bw, 0); 
  ctx.lineTo(bw, bandH);
  ctx.quadraticCurveTo(0, bandH * 0.7, -bw, bandH);
  ctx.closePath();

  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 5;

  ctx.fillStyle = baseColor;
  ctx.fill();

  // 줄무늬 패턴
  ctx.clip();
  ctx.strokeStyle = stripeColor;
  ctx.lineWidth = bandH * 0.5;
  ctx.globalAlpha = 0.4;
  for (let x = -faceW; x < faceW; x += bandH * 0.8) {
    ctx.beginPath();
    ctx.moveTo(x, -bandH);
    ctx.lineTo(x + bandH, bandH * 2);
    ctx.stroke();
  }
  ctx.restore();

  // 2. 넥타이 매듭
  const knotX = faceCX + faceW * 0.35;
  const knotY = bandY + (bandH * 0.5);
  
  ctx.save();
  ctx.translate(knotX, knotY);
  ctx.rotate(tilt + 0.1);
  
  const kw = faceW * 0.15, kh = faceW * 0.14;
  ctx.beginPath();
  ctx.moveTo(0, -kh/2);
  ctx.lineTo(kw/2, 0);
  ctx.lineTo(0, kh/2);
  ctx.lineTo(-kw/2, 0);
  ctx.closePath();
  ctx.fillStyle = baseColor;
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 8;
  ctx.fill();
  ctx.restore();

  // 3. 넥타이 꼬리 (중력 각도 반영)
  const gravityAngle = Math.PI / 2 - tilt;
  drawTail(ctx, knotX, knotY, faceW * 0.08, faceW * 0.45, gravityAngle - 0.4, baseColor, stripeColor, true);
  drawTail(ctx, knotX, knotY, faceW * 0.14, faceW * 0.7, gravityAngle + 0.1, baseColor, stripeColor, false);

  ctx.restore();
}

function drawTail(ctx, kx, ky, width, length, angle, base, stripe, isSmall) {
  ctx.save();
  ctx.translate(kx, ky);
  const swing = Math.sin(time * 0.05) * 0.1;
  ctx.rotate(angle + swing);

  ctx.beginPath();
  ctx.moveTo(-width * 0.5, 0);
  ctx.lineTo(width * 0.5, 0);
  ctx.lineTo(width * 1.1, length * 0.85);
  ctx.lineTo(0, length);
  ctx.lineTo(-width * 1.1, length * 0.85);
  ctx.closePath();

  const grad = ctx.createLinearGradient(-width, 0, width, 0);
  grad.addColorStop(0, base);
  grad.addColorStop(0.5, '#2a4a8a');
  grad.addColorStop(1, '#0a1a3a');
  
  ctx.fillStyle = grad;
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 12;
  ctx.shadowOffsetY = 10;
  ctx.fill();

  ctx.clip();
  ctx.strokeStyle = stripe;
  ctx.lineWidth = width * 0.6;
  ctx.globalAlpha = 0.3;
  for (let y = 0; y < length * 1.5; y += width * 0.9) {
    ctx.beginPath();
    ctx.moveTo(-width * 3, y - width);
    ctx.lineTo(width * 3, y);
    ctx.stroke();
  }
  ctx.restore();
}

function drawVignette(ctx, fl){
  if(fl<=0.02) return;
  const rv=ctx.createRadialGradient(W/2,H/2,W*0.5,W/2,H/2,Math.max(W,H)*0.75);
  rv.addColorStop(0,'rgba(0,0,0,0)');
  rv.addColorStop(1,`rgba(150,0,15,${fl*0.45})`);
  ctx.fillStyle=rv; ctx.fillRect(0,0,W,H);
}

function drawParticles(){
  fxCtx.clearRect(0,0,W,H);
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.38; p.life-=0.022; p.rot+=p.rotV;
    fxCtx.save();
    fxCtx.globalAlpha=p.life;
    fxCtx.translate(p.x,p.y); fxCtx.rotate(p.rot);
    if(p.type==='star'){
      fxCtx.font=`${p.size*2}px serif`; fxCtx.textAlign='center'; fxCtx.textBaseline='middle';
      fxCtx.fillText(p.emoji,0,0);
    } else {
      fxCtx.fillStyle=p.color; fxCtx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
    }
    fxCtx.restore();
  });
}

function onHit(x,y){
  if(!isRunning||hitCount>=MAX_HITS) return;
  hitCount++;
  filterLevel=Math.max(0,1-hitCount/MAX_HITS);
  document.getElementById('gaugeFill').style.width=(hitCount/MAX_HITS*100)+'%';
  const idx=Math.min(Math.floor((hitCount/MAX_HITS)*statusMsgs.length),statusMsgs.length-1);
  document.getElementById('statusText').textContent=statusMsgs[idx];

  cursor.classList.add('hit');
  setTimeout(()=>cursor.classList.remove('hit'),120);

  slapSide*=-1;
  shakePow=28-hitCount*0.8;
  shakeAngle=slapSide;

  showSlapText(x,y);
  flashSlap(slapSide);
  spawnSlapParticles(x,y);
  drawCrack(x,y);

  if(hitCount>=MAX_HITS) setTimeout(showClear,700);
}

function showSlapText(x,y){
  const el=document.getElementById('slapText');
  el.textContent=['찰싹!','퍽!','쾅!','빵!','탁!'][hitCount%5];
  el.style.left=x+'px'; el.style.top=y+'px';
  el.style.fontSize='0px'; el.style.opacity='1';
  el.style.transition='none';
  requestAnimationFrame(()=>{
    el.style.transition='font-size 0.11s ease-out, opacity 0.4s ease 0.18s, transform 0.4s ease';
    el.style.fontSize=Math.round((W*0.14)+(hitCount*W*0.012))+'px';
    el.style.transform=`translate(-50%,-50%) rotate(${(Math.random()-0.5)*24}deg) scale(1.1)`;
    setTimeout(()=>{ el.style.opacity='0'; },190);
  });
}

function flashSlap(side){
  const fl=document.getElementById('flash');
  fl.style.background=`radial-gradient(ellipse at ${side>0?'100%':'0%'} 50%, rgba(255,40,40,0.6) 0%, transparent 70%)`;
  fl.style.opacity='1';
  setTimeout(()=>fl.style.opacity='0', 150);
}

function spawnSlapParticles(x,y){
  const emojis=['🍺','💫','✨','🌟'];
  for(let i=0;i<6;i++){
    const a=-Math.PI/2+(Math.random()-0.5)*Math.PI;
    particles.push({
      type:'star', emoji:emojis[Math.floor(Math.random()*emojis.length)],
      x,y, vx:Math.cos(a)*10*slapSide, vy:Math.sin(a)*10-3,
      size:15, life:1, rot:0, rotV:0.2
    });
  }
}

function drawCrack(cx,cy){
  fxCtx.beginPath(); fxCtx.arc(cx,cy,5+hitCount,0,Math.PI*2);
  fxCtx.fillStyle='#ff1a2e'; fxCtx.fill();
}

function showClear(){
  isRunning=false;
  document.getElementById('clearScreen').classList.add('show');
  document.getElementById('gauge').style.display='none';
  document.getElementById('statusText').style.display='none';
}

function resetAll(){
  isRunning=false;
  hitCount=0; filterLevel=1.0; particles=[];
  document.getElementById('clearScreen').classList.remove('show');
  document.getElementById('gauge').style.display='flex';
  document.getElementById('statusText').style.display='block';
  document.getElementById('statusText').textContent='어젯밤에 뭔 짓을 한 거야...';
  document.getElementById('gaugeFill').style.width='0%';
  // 안내 오버레이 다시 표시 + 애니메이션 리셋
  const g = document.getElementById('guideOverlay');
  guideVisible = true;
  g.style.display = 'flex';
  g.style.opacity = '1';
  g.classList.remove('hidden');
  // 스텝 아이템 애니메이션 재실행
  g.querySelectorAll('.guide-step-item').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight; // reflow
    el.style.animation = '';
  });
  // 거울 체험 재개
  isRunning=true;
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
